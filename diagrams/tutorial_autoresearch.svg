<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 580" font-family="Helvetica,Arial,sans-serif">
  <title>Tutorial 03 - Greedy QoR autoresearch loop on the 4-bit counter (BUDGET=3)</title>
  <desc>
    DigitalAutoresearchRunner iterates over a discrete knob space (two axes:
    PL_TARGET_DENSITY_PCT with 5 ticks centred on the config value, CLOCK_PERIOD with
    3 ticks at 0.8x / 1.0x / 1.25x; 5 x 3 = 15 points). Each iteration picks one point,
    asks the agent to patch config.yaml, runs LibreLane, reads final/metrics.json, and
    computes a Figure of Merit. The greedy runner uses the running best to propose the
    next point, capped at BUDGET=3 LibreLane evaluations. Per-iteration agent rationale
    is appended to program.md; the FoM table accumulates in results.tsv. Default backend
    is opencode + Gemini Flash for cheap multi-eval loops (~$0.20-0.30 total).
  </desc>

  <style>
    .title       { font-size:22px; fill:#111; text-anchor:middle; font-weight:bold; }
    .label-big   { font-size:17px; fill:#111; font-weight:bold; }
    .label       { font-size:13px; fill:#111; font-weight:bold; }
    .kv          { font-size:12px; fill:#111; font-family:'Courier New',Courier,monospace; }
    .sub         { font-size:12px; fill:#444; }

    .knob        { fill:#fff7e6; stroke:#a05a00; stroke-width:2; }
    .runner      { fill:#eef6ff; stroke:#003b73; stroke-width:2.5; }
    .eval        { fill:#eefdef; stroke:#156b2e; stroke-width:2; }
    .fom         { fill:#f4ecff; stroke:#5a2da8; stroke-width:2; }
    .output      { fill:#f8f8f8; stroke:#444; stroke-width:1.5; }

    .arrow       { fill:none; stroke:#444; stroke-width:2.2; marker-end:url(#arrowhead); }
    .loop        { fill:none; stroke:#5a2da8; stroke-width:2.5; stroke-dasharray:6,4; marker-end:url(#arrowhead-purple); }
    .terminate   { fill:none; stroke:#444; stroke-width:2.5; marker-end:url(#arrowhead); }

    .arrow-label { font-size:13px; fill:#222; font-weight:bold; text-anchor:middle; }
    .loop-label  { font-size:13px; fill:#5a2da8; font-weight:bold; text-anchor:middle; }
    .term-label  { font-size:13px; fill:#222; font-weight:bold; text-anchor:middle; }
    .footer      { font-size:11px; fill:#777; text-anchor:middle; }
    .divider     { stroke:#bbb; stroke-width:1; }
  </style>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#444"/>
    </marker>
    <marker id="arrowhead-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#5a2da8"/>
    </marker>
  </defs>

  <!-- Header -->
  <text class="title" x="550" y="32">Tutorial 03 - Greedy QoR autoresearch loop  ·  BUDGET = 3 LibreLane evals</text>

  <!-- Loop arc back across the top: FoM-top to Runner-top, dashed purple -->
  <path class="loop" d="M 855 145 Q 615 80, 375 145"/>
  <text class="loop-label" x="615" y="86">propose next point  ·  back to Runner</text>

  <!-- Knob space box (amber) -->
  <rect class="knob" x="30" y="145" width="210" height="225" rx="8"/>
  <text class="label-big" x="135" y="170" text-anchor="middle">Knob space</text>
  <text class="sub"       x="135" y="187" text-anchor="middle" font-style="italic">2 axes  ·  5 x 3 ticks  ·  15 points</text>
  <line class="divider" x1="45" y1="198" x2="225" y2="198"/>
  <text class="label" x="45" y="220">PL_TARGET_DENSITY_PCT</text>
  <text class="sub"   x="55" y="234" font-style="italic">centred on config value</text>
  <text class="kv"    x="55" y="252">{45, 55, 65, 75, 80}</text>
  <text class="label" x="45" y="280">CLOCK_PERIOD (ns)</text>
  <text class="sub"   x="55" y="294" font-style="italic">0.8x / 1.0x / 1.25x of config</text>
  <text class="kv"    x="55" y="312">{40, 50, 62.5}</text>
  <line class="divider" x1="45" y1="328" x2="225" y2="328"/>
  <text class="sub" x="135" y="348" text-anchor="middle" font-style="italic">BUDGET=3 samples ~20%</text>
  <text class="sub" x="135" y="362" text-anchor="middle" font-style="italic">of the space</text>

  <!-- Knob -> Runner arrow -->
  <path class="arrow" d="M 240 257 L 266 257"/>

  <!-- DigitalAutoresearchRunner box (blue) -->
  <rect class="runner" x="270" y="145" width="210" height="225" rx="8"/>
  <text class="label-big" x="375" y="170" text-anchor="middle">Autoresearch</text>
  <text class="label-big" x="375" y="190" text-anchor="middle">Runner (greedy)</text>
  <line class="divider" x1="285" y1="201" x2="465" y2="201"/>
  <text class="label" x="285" y="219">Per iteration</text>
  <text class="sub"   x="295" y="235">1. pick / propose point</text>
  <text class="sub"   x="295" y="251">2. apply to config.yaml</text>
  <text class="sub"   x="295" y="267">3. ask agent to evaluate</text>
  <text class="sub"   x="295" y="283">4. compute FoM</text>
  <text class="sub"   x="295" y="299">5. update best so far</text>
  <line class="divider" x1="285" y1="313" x2="465" y2="313"/>
  <text class="label" x="285" y="331">Backend</text>
  <text class="kv"    x="285" y="347">opencode</text>
  <text class="kv"    x="285" y="361">+ Gemini Flash</text>

  <!-- Runner -> Eval arrow -->
  <path class="arrow" d="M 480 257 L 506 257"/>

  <!-- Eval box (green) -->
  <rect class="eval" x="510" y="145" width="210" height="225" rx="8"/>
  <text class="label-big" x="615" y="170" text-anchor="middle">Eval (one point)</text>
  <text class="sub"       x="615" y="187" text-anchor="middle" font-style="italic">LibreLane run, ~3-5 min</text>
  <line class="divider" x1="525" y1="198" x2="705" y2="198"/>
  <text class="label" x="525" y="218">Inside gf180 container</text>
  <text class="sub"   x="535" y="234">- patch config.yaml knobs</text>
  <text class="sub"   x="535" y="250">- run librelane flow</text>
  <text class="sub"   x="535" y="266">- read final/metrics.json</text>
  <line class="divider" x1="525" y1="280" x2="705" y2="280"/>
  <text class="label" x="525" y="298">Extracted scalars (FoM input)</text>
  <text class="kv"    x="535" y="316">die_area_um2</text>
  <text class="kv"    x="535" y="332">wns_worst_ns</text>
  <text class="kv"    x="535" y="348">power_mw</text>

  <!-- Eval -> FoM arrow -->
  <path class="arrow" d="M 720 257 L 746 257"/>

  <!-- FoM box (purple) -->
  <rect class="fom" x="750" y="145" width="210" height="225" rx="8"/>
  <text class="label-big" x="855" y="170" text-anchor="middle">FoM</text>
  <text class="sub"       x="855" y="187" text-anchor="middle" font-style="italic">score per eval  ·  pick winner</text>
  <line class="divider" x1="765" y1="198" x2="945" y2="198"/>
  <text class="label" x="765" y="218">Tiebreak rules</text>
  <text class="sub"   x="775" y="234">- positive setup slack</text>
  <text class="sub"   x="775" y="250">- minimum die area</text>
  <text class="sub"   x="775" y="266">- minimum power</text>
  <line class="divider" x1="765" y1="280" x2="945" y2="280"/>
  <text class="label" x="765" y="298">Cost cap (implicit)</text>
  <text class="sub"   x="775" y="314">~$0.05-0.10 / agent turn</text>
  <text class="sub"   x="775" y="330">~$0.20-0.30 total</text>
  <text class="sub"   x="775" y="346">(opencode + Gemini Flash)</text>

  <!-- Terminate arrow: FoM bottom -> Outputs (after BUDGET reached) -->
  <path class="terminate" d="M 855 370 L 855 405 L 550 405 L 550 432"/>
  <text class="term-label" x="700" y="397">after BUDGET reached: write outputs</text>

  <!-- Outputs box -->
  <rect class="output" x="200" y="435" width="700" height="105" rx="8"/>
  <text class="label-big" x="550" y="458" text-anchor="middle">Outputs (under WORK_DIR/)</text>
  <line class="divider" x1="220" y1="468" x2="880" y2="468"/>

  <!-- Outputs left column: program.md -->
  <text class="label" x="220" y="486">program.md</text>
  <text class="sub"   x="220" y="502">per-iteration agent rationale</text>
  <text class="sub"   x="220" y="518" font-style="italic">e.g. "I picked density=70 next because Eval 2's slack was positive"</text>

  <!-- Outputs right column: results.tsv -->
  <text class="label" x="560" y="486">results.tsv</text>
  <text class="sub"   x="560" y="502">tab-separated FoM table</text>
  <text class="sub"   x="560" y="518" font-style="italic">one row per LibreLane eval; sort to find the winning point</text>

  <!-- Footer -->
  <text class="footer" x="550" y="568">chipathon-gf180mcu-librelane-examples - diagrams/tutorial_autoresearch.svg</text>
</svg>
