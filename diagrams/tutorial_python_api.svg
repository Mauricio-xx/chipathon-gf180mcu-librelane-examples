<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Helvetica,Arial,sans-serif">
  <title>Tutorial 02 - Python API: GenericDesign + ProjectManager + 4 specialists</title>
  <desc>
    A short Python script wraps a LibreLane config in GenericDesign and hands it to
    ProjectManager (the master agent). With backend="adk", ProjectManager spawns four
    specialist LlmAgents (Synthesis, Physical, Verification, Signoff), each with its own
    Python tool allowlist; the master picks one specialist per turn. With backend="cc_cli"
    the master and specialists collapse into a single Claude Code subprocess that talks to
    the same tools. Tool calls drive `docker exec` into the gf180 container running
    LibreLane. Output is rtl2gds_results.json under the work_dir. The default mode is
    dry-run (RUN_REAL=False in the script); a real run takes ~10-15 minutes.
  </desc>

  <style>
    .title       { font-size:22px; fill:#111; text-anchor:middle; font-weight:bold; }
    .label-big   { font-size:17px; fill:#111; font-weight:bold; }
    .label       { font-size:13px; fill:#111; font-weight:bold; }
    .kv          { font-size:12px; fill:#111; font-family:'Courier New',Courier,monospace; }
    .sub         { font-size:12px; fill:#444; }

    .script      { fill:#fff7e6; stroke:#a05a00; stroke-width:2; }
    .pm          { fill:#f4ecff; stroke:#5a2da8; stroke-width:2.5; }
    .specialist  { fill:#eef6ff; stroke:#003b73; stroke-width:2; }
    .specialists-group { fill:#fafafa; stroke:#888; stroke-width:1.2; stroke-dasharray:4,3; }
    .container   { fill:#eefdef; stroke:#156b2e; stroke-width:2; }
    .output      { fill:#f8f8f8; stroke:#444; stroke-width:1.5; }
    .backend-pill { fill:#fff; stroke:#5a2da8; stroke-width:1.5; }

    .arrow       { fill:none; stroke:#444; stroke-width:2.2; marker-end:url(#arrowhead); }
    .arrow-thick { fill:none; stroke:#5a2da8; stroke-width:2.5; marker-end:url(#arrowhead-purple); }

    .arrow-label { font-size:13px; fill:#222; font-weight:bold; text-anchor:middle; }
    .arrow-kv    { font-size:12px; fill:#222; font-family:'Courier New',Courier,monospace; text-anchor:middle; }
    .footer      { font-size:11px; fill:#777; text-anchor:middle; }
    .divider     { stroke:#bbb; stroke-width:1; }
  </style>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#444"/>
    </marker>
    <marker id="arrowhead-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#5a2da8"/>
    </marker>
  </defs>

  <!-- Header -->
  <text class="title" x="550" y="32">Tutorial 02 - Python API  ·  ProjectManager + 4 specialists</text>

  <!-- run_counter.py box (top-left) -->
  <rect class="script" x="40" y="60" width="520" height="160" rx="8"/>
  <text class="label-big" x="300" y="84" text-anchor="middle">run_counter.py</text>
  <text class="sub"       x="300" y="102" text-anchor="middle" font-style="italic">~ 30 lines of async Python</text>
  <line class="divider" x1="55" y1="113" x2="545" y2="113"/>
  <text class="kv" x="55" y="135">design = GenericDesign("librelane/config.yaml")</text>
  <text class="kv" x="55" y="153">pm = ProjectManager(design,</text>
  <text class="kv" x="55" y="169">      backend="cc_cli",</text>
  <text class="kv" x="55" y="185">      model="claude-sonnet-4-6")</text>
  <text class="kv" x="55" y="207">result = await pm.run(work_dir, dry_run=True)</text>

  <!-- ProjectManager box (top-right) -->
  <rect class="pm" x="600" y="60" width="460" height="160" rx="8"/>
  <text class="label-big" x="830" y="84" text-anchor="middle">ProjectManager  (master agent)</text>
  <text class="sub"       x="830" y="102" text-anchor="middle" font-style="italic">orchestrates 4 specialists, picks one per turn</text>
  <line class="divider" x1="615" y1="113" x2="1045" y2="113"/>
  <text class="label" x="615" y="135">Per turn</text>
  <text class="sub"   x="625" y="151">- inspect LibreLane logs + metrics</text>
  <text class="sub"   x="625" y="167">- pick the right specialist; delegate</text>
  <text class="sub"   x="625" y="183">- collect result; track $ budget</text>

  <!-- backend pills with caption -->
  <rect class="backend-pill" x="615" y="195" width="190" height="20" rx="10"/>
  <text class="kv" x="710" y="210" text-anchor="middle" fill="#5a2da8">backend = "cc_cli"</text>
  <rect class="backend-pill" x="820" y="195" width="190" height="20" rx="10"/>
  <text class="kv" x="915" y="210" text-anchor="middle" fill="#5a2da8">backend = "adk"</text>

  <!-- Arrow Script -> PM (horizontal, top row) -->
  <path class="arrow" d="M 560 140 L 596 140"/>
  <text class="arrow-label" x="578" y="132">construct</text>

  <!-- Arrow PM -> Specialists group (L-shape: down then left) -->
  <path class="arrow-thick" d="M 830 220 L 830 250 L 550 250 L 550 281"/>
  <text class="arrow-label" x="690" y="242" fill="#5a2da8">delegates per turn</text>

  <!-- Specialists group (soft outer rect, height grown to fit 3 tool lines per spec) -->
  <rect class="specialists-group" x="80" y="285" width="940" height="175" rx="8"/>
  <text class="label" x="550" y="303" text-anchor="middle">4 specialists  ·  each with its own Python tool allowlist  ·  picked one per turn by ProjectManager</text>
  <text class="sub"   x="550" y="321" text-anchor="middle" font-style="italic">execution: backend="adk" runs each as a separate LlmAgent  ·  backend="cc_cli" collapses all into one Claude Code subprocess</text>

  <!-- Specialist 1: SynthesisEngineer -->
  <rect class="specialist" x="100" y="335" width="220" height="115" rx="6"/>
  <text class="label-big" x="210" y="357" text-anchor="middle">SynthesisEngineer</text>
  <text class="sub"       x="210" y="374" text-anchor="middle" font-style="italic">RTL -&gt; netlist + STA</text>
  <line class="divider" x1="115" y1="383" x2="305" y2="383"/>
  <text class="label" x="115" y="397">Tools (4)</text>
  <text class="kv"    x="115" y="413">run_librelane_flow</text>
  <text class="kv"    x="115" y="427">read_timing_report</text>
  <text class="kv"    x="115" y="441">modify_flow_config (+1)</text>

  <!-- Specialist 2: PhysicalDesigner -->
  <rect class="specialist" x="335" y="335" width="220" height="115" rx="6"/>
  <text class="label-big" x="445" y="357" text-anchor="middle">PhysicalDesigner</text>
  <text class="sub"       x="445" y="374" text-anchor="middle" font-style="italic">fp -&gt; place -&gt; CTS -&gt; route</text>
  <line class="divider" x1="350" y1="383" x2="540" y2="383"/>
  <text class="label" x="350" y="397">Tools (5)</text>
  <text class="kv"    x="350" y="413">run_librelane_flow</text>
  <text class="kv"    x="350" y="427">run_physical_slice</text>
  <text class="kv"    x="350" y="441">modify_flow_config (+2)</text>

  <!-- Specialist 3: VerificationEngineer -->
  <rect class="specialist" x="570" y="335" width="220" height="115" rx="6"/>
  <text class="label-big" x="680" y="357" text-anchor="middle">VerificationEngineer</text>
  <text class="sub"       x="680" y="374" text-anchor="middle" font-style="italic">RTL lint + cocotb/iverilog sim</text>
  <line class="divider" x1="585" y1="383" x2="775" y2="383"/>
  <text class="label" x="585" y="397">Tools (2)</text>
  <text class="kv"    x="585" y="413">run_rtl_lint</text>
  <text class="kv"    x="585" y="427">run_rtl_sim</text>

  <!-- Specialist 4: SignoffChecker -->
  <rect class="specialist" x="805" y="335" width="220" height="115" rx="6"/>
  <text class="label-big" x="915" y="357" text-anchor="middle">SignoffChecker</text>
  <text class="sub"       x="915" y="374" text-anchor="middle" font-style="italic">DRC + LVS + precheck</text>
  <line class="divider" x1="820" y1="383" x2="1010" y2="383"/>
  <text class="label" x="820" y="397">Tools (7)</text>
  <text class="kv"    x="820" y="413">run_klayout_drc</text>
  <text class="kv"    x="820" y="427">run_klayout_lvs</text>
  <text class="kv"    x="820" y="441">run_precheck (+4)</text>

  <!-- Single arrow specialists group -> container -->
  <path class="arrow" d="M 550 460 L 550 502"/>
  <text class="arrow-kv" x="550" y="478">docker exec gf180 bash -lc '...'</text>
  <text class="sub" x="550" y="494" text-anchor="middle" font-style="italic">(every tool call drives the same container)</text>

  <!-- gf180 container -->
  <rect class="container" x="200" y="505" width="700" height="90" rx="8"/>
  <text class="label-big" x="550" y="528" text-anchor="middle">gf180 container</text>
  <text class="sub"       x="550" y="546" text-anchor="middle" font-style="italic">hpretl/iic-osic-tools:next  ·  /foss/designs/eda_agents_counter_pyapi/</text>
  <line class="divider" x1="220" y1="556" x2="880" y2="556"/>
  <text class="kv" x="550" y="578" text-anchor="middle">LibreLane writes runs/&lt;tag&gt;/final/  (gds, metrics.csv, sdc, sdf, spef)</text>

  <!-- Arrow container -> output -->
  <path class="arrow" d="M 550 595 L 550 632"/>

  <!-- Output box -->
  <rect class="output" x="300" y="635" width="500" height="50" rx="6"/>
  <text class="label-big" x="550" y="657" text-anchor="middle">rtl2gds_results.json</text>
  <text class="sub"       x="550" y="677" text-anchor="middle" font-style="italic">signoff metrics + per-stage status + agent log (under work_dir)</text>

  <!-- Footer -->
  <text class="footer" x="550" y="694">chipathon-gf180mcu-librelane-examples - diagrams/tutorial_python_api.svg</text>
</svg>
