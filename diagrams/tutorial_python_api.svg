<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Helvetica,Arial,sans-serif">
  <title>Tutorial 02 - Drive the chipathon flow programmatically via eda-agents Python API</title>
  <desc>
    A Python script wraps the LibreLane config in GenericDesign and hands it to ProjectManager.
    ProjectManager is the master agent; it orchestrates four specialists (Synthesis, Physical,
    Verification, Signoff) each with their own tool allowlist. Each specialist runs as either a
    Claude Code subprocess (cc_cli backend) or a Google ADK LlmAgent (adk backend). The agent
    drives `docker exec` into the gf180 container and reads back metrics.csv.
  </desc>

  <style>
    .title       { font-size:22px; fill:#111; text-anchor:middle; font-weight:bold; }
    .subtitle    { font-size:14px; fill:#444; text-anchor:middle; font-style:italic; }
    .script      { fill:#fff7e6; stroke:#a05a00; stroke-width:2; }
    .design      { fill:#eef6ff; stroke:#003b73; stroke-width:2; }
    .pm          { fill:#f4ecff; stroke:#5a2da8; stroke-width:2.5; }
    .specialist  { fill:#eefdef; stroke:#156b2e; stroke-width:2; }
    .container   { fill:#fff0f0; stroke:#a02020; stroke-width:2; }
    .output      { fill:#fafafa; stroke:#444; stroke-width:1.5; }
    .label-big   { font-size:17px; fill:#111; font-weight:bold; }
    .label       { font-size:13px; fill:#111; font-weight:bold; }
    .kv          { font-size:12px; fill:#111; font-family:monospace; }
    .sub         { font-size:12px; fill:#444; }
    .arrow       { fill:none; stroke:#555; stroke-width:1.8; marker-end:url(#arrowhead); }
    .arrow-label { font-size:13px; fill:#444; font-weight:bold; text-anchor:middle; }
    .footer      { font-size:11px; fill:#777; text-anchor:middle; }
  </style>

  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L0,10 L9,5 z" fill="#555"/>
    </marker>
  </defs>

  <!-- header -->
  <text class="title"    x="500" y="30">Tutorial 02 - Python API: GenericDesign + ProjectManager + 4 specialists</text>
  <text class="subtitle" x="500" y="52">~30 lines of Python; ProjectManager picks which specialist to call at each turn</text>

  <!-- Python script -->
  <rect class="script" x="30" y="90" width="200" height="140" rx="8"/>
  <text class="label-big" x="130" y="118" text-anchor="middle">run_counter.py</text>
  <text class="sub"        x="130" y="138" text-anchor="middle">~30 lines, async</text>
  <text class="kv"    x="40"  y="170">design = GenericDesign(</text>
  <text class="kv"    x="40"  y="186">  "librelane/</text>
  <text class="kv"    x="40"  y="202">     config.yaml")</text>
  <text class="kv"    x="40"  y="218">pm = ProjectManager(...)</text>

  <!-- GenericDesign + config.yaml -->
  <rect class="design" x="270" y="90" width="200" height="140" rx="8"/>
  <text class="label-big" x="370" y="118" text-anchor="middle">GenericDesign</text>
  <text class="sub"        x="370" y="138" text-anchor="middle">auto-derived 13 methods</text>
  <text class="label" x="280" y="166">From config.yaml:</text>
  <text class="kv"    x="280" y="184">project_name()</text>
  <text class="kv"    x="280" y="200">verilog_files()</text>
  <text class="kv"    x="280" y="216">clock_period() ...</text>

  <!-- ProjectManager -->
  <rect class="pm" x="510" y="90" width="200" height="140" rx="8"/>
  <text class="label-big" x="610" y="118" text-anchor="middle">ProjectManager</text>
  <text class="sub"        x="610" y="138" text-anchor="middle">master agent</text>
  <text class="label" x="520" y="166">Backend:</text>
  <text class="kv"    x="520" y="184">"cc_cli"  (subscription)</text>
  <text class="kv"    x="520" y="200">"adk"     (API key)</text>
  <text class="sub"   x="520" y="220">Picks next specialist</text>

  <!-- Specialists fan-out (right) -->
  <text class="label" x="780" y="80">4 specialists, parallel-callable</text>

  <rect class="specialist" x="750" y="95" width="220" height="55" rx="6"/>
  <text class="label" x="760" y="118">SynthesisEngineer</text>
  <text class="sub"   x="760" y="135">Yosys, timing estimation, cell count</text>

  <rect class="specialist" x="750" y="160" width="220" height="55" rx="6"/>
  <text class="label" x="760" y="183">PhysicalDesigner</text>
  <text class="sub"   x="760" y="200">floorplan -&gt; place -&gt; CTS -&gt; route</text>

  <rect class="specialist" x="750" y="225" width="220" height="55" rx="6"/>
  <text class="label" x="760" y="248">VerificationEngineer</text>
  <text class="sub"   x="760" y="265">DRC, LVS, precheck</text>

  <rect class="specialist" x="750" y="290" width="220" height="55" rx="6"/>
  <text class="label" x="760" y="313">SignoffChecker</text>
  <text class="sub"   x="760" y="330">final STA, GDS validation</text>

  <!-- Container -->
  <rect class="container" x="270" y="370" width="440" height="80" rx="6"/>
  <text class="label-big" x="490" y="395" text-anchor="middle">gf180 container</text>
  <text class="sub"        x="490" y="412" text-anchor="middle">specialists drive `docker exec gf180 bash -lc '...'`</text>
  <text class="kv"    x="290" y="435">runs/&lt;tag&gt;/final/  -&gt;  metrics.csv  (parsed by SignoffChecker)</text>

  <!-- Output -->
  <rect class="output" x="270" y="470" width="440" height="60" rx="6"/>
  <text class="label-big" x="490" y="493" text-anchor="middle">rtl2gds_results.json</text>
  <text class="sub"        x="490" y="513" text-anchor="middle">signoff metrics + per-stage status; agent log under WORK_DIR/</text>

  <!-- Arrows -->
  <!-- script -> design -->
  <path class="arrow" d="M 230 160 L 270 160"/>

  <!-- design -> pm -->
  <path class="arrow" d="M 470 160 L 510 160"/>
  <text class="arrow-label" x="490" y="150">wraps</text>

  <!-- pm -> specialists (fan-out) -->
  <path class="arrow" d="M 710 130 L 750 122"/>
  <path class="arrow" d="M 710 150 L 750 187"/>
  <path class="arrow" d="M 710 170 L 750 252"/>
  <path class="arrow" d="M 710 190 L 750 317"/>
  <text class="arrow-label" x="730" y="140">delegates</text>

  <!-- specialists -> container -->
  <path class="arrow" d="M 860 350 L 600 370"/>
  <text class="arrow-label" x="730" y="360">docker exec</text>

  <!-- container -> output -->
  <path class="arrow" d="M 490 450 L 490 470"/>

  <text class="footer" x="500" y="555">chipathon-gf180mcu-librelane-examples - diagrams/tutorial_python_api.svg</text>
</svg>
